name: E2E

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  e2e:
    name: Black-box E2E against production
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Public + API smoke tests
        continue-on-error: true
        run: npm run test:public

      - name: Authenticated dashboard tests
        continue-on-error: true
        run: npm run test:dashboard
        env:
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - name: Upload login failure screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: login-failure
          path: login-failure.png

      - name: Anonymize Allure results for public report
        if: always()
        run: node scripts/anonymize-allure-portfolio.cjs

      - name: Generate Allure report
        if: always()
        run: ./node_modules/.bin/allure generate allure-results --clean -o allure-report

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 30

      - name: Deploy Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages
