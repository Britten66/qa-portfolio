name: E2E

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  e2e:
    name: Black-box E2E against production
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Public + API smoke tests
        run: npm run test:public
        env:
          TARGET_URL: ${{ secrets.TARGET_URL }}
          FUNCTIONS_BASE: ${{ secrets.FUNCTIONS_BASE }}

      - name: Authenticated dashboard tests
        run: npm run test:dashboard
        env:
          TARGET_URL: ${{ secrets.TARGET_URL }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - name: BDD scenarios (invoice lifecycle)
        run: npm run test:bdd
        env:
          TARGET_URL: ${{ secrets.TARGET_URL }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      # Live monitoring against a third-party client site. Best-effort, so it
      # does not gate the portfolio's build status when the site or its
      # secrets are unavailable.
      - name: Client site Selenium tests
        continue-on-error: true
        run: npm run test:client-site
        env:
          CLIENT_SITE_URL: ${{ secrets.CLIENT_SITE_URL }}
          CLIENT_PAGE_PATH: ${{ secrets.CLIENT_PAGE_PATH }}
          CLIENT_IGNORE_ERROR_PATTERNS: ${{ secrets.CLIENT_IGNORE_ERROR_PATTERNS }}

      - name: Upload login failure screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: login-failure
          path: login-failure.png

      - name: Anonymize Allure results for public report
        if: always()
        run: node scripts/anonymize-allure-portfolio.cjs
        env:
          ANONYMIZE_TERMS: ${{ secrets.ANONYMIZE_TERMS }}

      - name: Generate Allure report
        if: always()
        run: ./node_modules/.bin/allure generate allure-results --clean -o allure-report

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 30

      - name: Deploy Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages
